# Render Blueprint — truthlens-ua-analytics-v2 (NMVP2)
# Після створення сервісів оновіть API_URL у dashboard на фактичний URL API.

services:
  - type: web
    name: truthlens-ua-analytics-v2-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: artifacts/best_model.joblib
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: DATABASE_URL
        sync: false

  - type: web
    name: truthlens-ua-analytics-v2-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -r dashboard/requirements.txt
    startCommand: streamlit run dashboard/Home.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_URL
        value: https://truthlens-ua-analytics-v2-api.onrender.com
      - key: PYTHONUNBUFFERED
        value: "1"
